
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Laboratorios Diario</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#FFFFFF; color:#153244; display:flex; height:100vh; }
#sidebar { width: 200px; background:#153244; color:#FFFFFF; overflow-y:auto; padding:10px; }
#sidebar h2 { font-size:1.1rem; text-align:center; margin-bottom:1rem; }
.lab { padding:0.5rem; margin:0.3rem 0; background:#3C3C3B; border-radius:5px; cursor:pointer; text-align:center; transition:0.2s; }
.lab:hover { background:#8DE2D6; color:#153244; }
#main { flex:1; padding:10px; display:flex; flex-direction:column; overflow:auto; }
#calendarTable { border-collapse:collapse; width:100%; table-layout:fixed; }
#calendarTable th, #calendarTable td { border:1px solid #ccc; text-align:center; height:50px; position:relative; cursor:pointer; }
#calendarTable th { background:#FFCC00; color:#153244; position:sticky; top:0; }
.event { position:absolute; top:2px; left:2px; right:2px; bottom:2px; color:#FFFFFF; padding:2px; border-radius:4px; font-size:0.8em; overflow:hidden; display:flex; align-items:center; justify-content:center; text-align:center; }
#modal { position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:9999; }
#modalContent { background:white; padding:1rem; border-radius:10px; width:80%; max-width:800px; height:80%; overflow:auto; }
#modalContent h3 { text-align:center; margin-top:0; }
#closeModal { float:right; cursor:pointer; font-weight:bold; }
#toolbar { margin-bottom:10px; display:flex; justify-content:flex-end; gap:10px; }
button { background:#153244; color:#FFFFFF; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; }
button:hover { background:#8DE2D6; color:#153244; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Laboratorios</h2>
  <div id="labList"></div>
</div>

<div id="main">
  <div id="toolbar">
    <button id="btnHoy">Ir a hoy</button>
  </div>
  <h2>Dashboard Diario</h2>
  <table id="calendarTable">
    <thead>
      <tr>
        <th>Hora</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal Mensual -->
<div id="modal">
  <div id="modalContent">
    <span id="closeModal">X</span>
    <h3 id="modalTitle">Eventos Mensuales</h3>
    <div id="monthCalendar"></div>
  </div>
</div>

<script>
const labs = ["SUM","HYS","TEXTIL","RA","ROBOTICA","IA","FINANZAS","TRANSPORTE","LOGISTICA","HYS2","STREAMING","ENERGIA","SUSTENTABILIDAD","DIGITAL"];
const colors = ["#FFCC00","#153244","#8DE2D6","#3C3C3B","#FFCC00","#153244","#8DE2D6","#3C3C3B","#FFCC00","#153244","#8DE2D6","#3C3C3B","#FFCC00","#153244"];
const hours = Array.from({length:14},(_,i)=>8+i);
let events = JSON.parse(localStorage.getItem("labDashboardEvents")||"{}");

const tbody = document.querySelector("#calendarTable tbody");
const labList = document.getElementById("labList");
const modal = document.getElementById("modal");
const closeModal = document.getElementById("closeModal");
const monthCalendar = document.getElementById("monthCalendar");
const modalTitle = document.getElementById("modalTitle");

function buildTable(){
  const thead = document.querySelector("#calendarTable thead tr");
  labs.forEach(lab=>{
    const th = document.createElement("th");
    th.textContent = lab;
    thead.appendChild(th);
  });

  tbody.innerHTML="";
  hours.forEach(h=>{
    const tr = document.createElement("tr");
    const th = document.createElement("th");
    th.textContent = `${h}:00`;
    tr.appendChild(th);
    labs.forEach(lab=>{
      const td = document.createElement("td");
      td.dataset.lab = lab;
      td.dataset.hour = h;
      td.addEventListener("click", ()=>{
        const title = prompt(`Nuevo evento en ${lab} a las ${h}:00 (Hoy)`); 
        if(title){
          const today = new Date().toISOString().split("T")[0];
          if(!events[today]) events[today]={};
          if(!events[today][lab]) events[today][lab]={};
          events[today][lab][h] = title;
          localStorage.setItem("labDashboardEvents", JSON.stringify(events));
          renderEvents();
        }
      });
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function renderEvents(){
  document.querySelectorAll("#calendarTable td").forEach(td=>{
    const lab = td.dataset.lab;
    const hour = td.dataset.hour;
    td.innerHTML="";
    const today = new Date().toISOString().split("T")[0];
    if(events[today] && events[today][lab] && events[today][lab][hour]){
      const div = document.createElement("div");
      div.className="event";
      div.textContent = events[today][lab][hour];
      div.style.backgroundColor = colors[labs.indexOf(lab)];
      div.addEventListener("click", e=>{
        e.stopPropagation();
        const action = prompt("1: Editar\n2: Eliminar");
        if(action==="1"){
          const newTitle = prompt("Nuevo título:", events[today][lab][hour]);
          if(newTitle){
            events[today][lab][hour]=newTitle;
            localStorage.setItem("labDashboardEvents", JSON.stringify(events));
            renderEvents();
          }
        } else if(action==="2"){
          delete events[today][lab][hour];
          localStorage.setItem("labDashboardEvents", JSON.stringify(events));
          renderEvents();
        }
      });
      td.appendChild(div);
    }
  });
}

// Lista lateral de laboratorios
labs.forEach((lab,i)=>{
  const div = document.createElement("div");
  div.className="lab";
  div.style.backgroundColor = colors[i];
  div.textContent = lab;
  div.addEventListener("click", ()=>{
    openModalLab(lab);
  });
  labList.appendChild(div);
});

function openModalLab(lab){
  modal.style.display="flex";
  modalTitle.textContent = `Eventos de ${lab}`;
  monthCalendar.innerHTML="";
  const calendarEl = document.createElement("div");
  monthCalendar.appendChild(calendarEl);

  const fcEvents = [];
  for(let date in events){
    if(events[date][lab]){
      for(let hour in events[date][lab]){
        const start = `${date}T${hour.padStart(2,'0')}:00:00`;
        const endHour = String(Number(hour)+1).padStart(2,'0');
        const end = `${date}T${endHour}:00:00`;
        fcEvents.push({title:events[date][lab][hour], start, end, color:colors[labs.indexOf(lab)]});
      }
    }
  }

  new FullCalendar.Calendar(calendarEl,{
    locale:"es",
    initialView:"dayGridMonth",
    height:"100%",
    headerToolbar:{left:"prev,next today",center:"title",right:"dayGridMonth,timeGridWeek"},
    events:fcEvents
  }).render();
}

closeModal.addEventListener("click", ()=>{modal.style.display="none";});
document.getElementById("btnHoy").addEventListener("click", ()=>{buildTable(); renderEvents();});

buildTable();
renderEvents();
</script>
</body>
</html>
